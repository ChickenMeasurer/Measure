<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Upload Hub | Drafting Services</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: url('backgroundmain.png') no-repeat center center fixed; 
            background-size: cover;
            padding: 20px; 
            color: #263238;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            background: url('textbackground.jpg'), url('https://www.toptal.com/designers/subtlepatterns/uploads/paper.png');
            background-blend-mode: overlay;
            background-size: cover;
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #d7ccc8;
            border-top: 8px solid #003399; /* Brand Corporate Blue Accent */
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid #003399; padding-bottom: 15px; text-align: center; color: #003399; }
        label { display: block; margin-top: 20px; font-weight: 700; font-size: 0.8em; color: #4e342e; text-transform: uppercase; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #bcaaa4; 
            border-radius: 4px; box-sizing: border-box; font-size: 16px; 
            background: rgba(255, 255, 255, 0.85); 
        }

        /* Scan Section Styling */
        .scan-box {
            background: rgba(0, 51, 153, 0.05);
            border: 2px dashed #003399;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scan-box:hover {
            background: rgba(0, 51, 153, 0.1);
        }

        .scan-box p {
            margin: 5px 0 0 0;
            font-size: 0.9em;
            font-weight: bold;
            color: #003399;
        }

        #fileInput { display: none; }

        /* Status Spinner Overlay */
        .status-message {
            display: none;
            font-weight: bold;
            color: #b71c1c; /* Accent Red */
            font-size: 0.9em;
            text-align: center;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Salesperson Segmented Grid Styling */
        .salesperson-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .salesperson-option {
            position: relative;
            text-align: center;
        }

        .salesperson-option input {
            position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0;
        }

        .salesperson-label {
            display: block; background: rgba(255, 255, 255, 0.7); border: 1px solid #bcaaa4;
            padding: 12px 0; border-radius: 4px; font-weight: bold; color: #4e342e;
            cursor: pointer; transition: all 0.2s ease; font-size: 0.95em;
        }

        .salesperson-option input:checked + .salesperson-label {
            background: #003399;
            color: white;
            border-color: #003399;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .radio-group { 
            margin-top: 20px; background: rgba(255, 255, 255, 0.5); 
            padding: 15px; border-radius: 4px; border: 1px solid #d7ccc8; 
        }

        .time-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
        }

        .radio-option { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; font-size: 0.85em; font-weight: 500; }
        .radio-option input { width: auto; margin-top: 0; margin-right: 6px; height: 16px; width: 16px; accent-color: #003399; }

        button.submit-btn { 
            width: 100%; background: #2e7d32; color: white; border: none; padding: 18px; 
            margin-top: 30px; border-radius: 4px; font-size: 16px; font-weight: bold; 
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: background 0.3s;
        }
        button.submit-btn:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sales Upload Hub</h2>
    
    <div class="scan-box" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 32px;">📸</span>
        <p id="uploadPrompt">Tap to Snap or Upload Estimate Sheet</p>
        <input type="file" id="fileInput" accept="image/*" onchange="processEstimatePhoto(event)">
    </div>

    <div class="status-message" id="statusBox">Reading Document Fields...</div>

    <form id="measureForm">
        <label>Salesperson</label>
        <div class="salesperson-grid">
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_as" value="AS" required>
                <label for="sales_as" class="salesperson-label">AS</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_bc" value="BC">
                <label for="sales_bc" class="salesperson-label">BC</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_cl" value="CL">
                <label for="sales_cl" class="salesperson-label">CL</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_df" value="DF">
                <label for="sales_df" class="salesperson-label">DF</label>
            </div>
        </div>
        
        <label>Customer Name</label>
        <input type="text" name="name" id="name" placeholder="Full Name" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" id="phone" placeholder="(555) 555-5555" required>

        <label>Estimate Number (ES)</label>
        <input type="text" name="estimate_number" id="estimate_number" placeholder="e.g., ES607765">

        <label>Address</label>
        <input type="text" name="address" id="address" placeholder="Project Address" required>

        <label>What are we measuring?</label>
        <textarea name="details" id="details" rows="3" placeholder="Project layout components..."></textarea>

        <label>Days available:</label>
        <input type="text" id="datePicker" name="available_days" placeholder="Tap to select dates" required>

        <label>Preferred Times</label>
        <div class="radio-group time-grid">
            <label class="radio-option"><input type="checkbox" name="time" value="8:30 AM"> 8:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="9:00 AM"> 9:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="9:30 AM"> 9:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="10:00 AM"> 10:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="10:30 AM"> 10:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="11:00 AM"> 11:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="11:30 AM"> 11:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="12:00 PM"> 12:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="12:30 PM"> 12:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="1:00 PM"> 1:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="1:30 PM"> 1:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="2:00 PM"> 2:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="2:30 PM"> 2:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="3:00 PM"> 3:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="3:30 PM"> 3:30 PM</label>
        </div>

        <input type="hidden" name="confirmation" value="Text Cell">
        <button type="submit" class="submit-btn" id="submitBtn">Verify & Submit Request</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
      authDomain: "chickenmeasurer-37304.firebaseapp.com",
      projectId: "chickenmeasurer-37304",
      storageBucket: "chickenmeasurer-37304.firebasestorage.app",
      messagingSenderId: "871581751225",
      appId: "1:871581751225:web:bec4978ba235c1c4418868"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    flatpickr("#datePicker", {
        mode: "multiple", dateFormat: "Y-m-d", minDate: "today", altInput: true, altFormat: "F j, Y", conjunction: ", "
    });

    const googleKey = "AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q";

    // Engine parser routing invoice photo directly to Gemini Vision API
    window.processEstimatePhoto = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('uploadPrompt').innerText = file.name;
        const statusBox = document.getElementById('statusBox');
        statusBox.style.display = "block";
        statusBox.innerText = "Processing Document Fields...";

        const reader = new FileReader();
        reader.onloadend = async function() {
            const base64Data = reader.result.split(',')[1];
            
            // Explicit structure instructions targeting the corporate invoice layout
            const promptText = "Analyze this estimate sheet invoice. Extract the following properties and respond ONLY with a clean JSON object containing keys: 'name' (look under 'Ship To' or 'Sold To' first name last name), 'address' (full street address, city, state, zip found under 'Ship To'), 'es_number' (the Quote Number/Estimate string near top right), and 'details' (a short summary breakdown string of item descriptions mentioned like carpet type, padding, or countertop). Do not output markdown codeblocks, just raw JSON.";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${googleKey}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: file.type, data: base64Data } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text.trim();
                
                // Strip markdown codeblock backticks if Gemini accidentally includes them
                const cleanJsonText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                const parsedResult = JSON.parse(cleanJsonText);

                // Auto-fill fields on the screen
                if (parsedResult.name) document.getElementById('name').value = parsedResult.name;
                if (parsedResult.es_number) document.getElementById('estimate_number').value = parsedResult.es_number;
                if (parsedResult.address) document.getElementById('address').value = parsedResult.address;
                if (parsedResult.details) document.getElementById('details').value = parsedResult.details;

                statusBox.innerText = "Success! Fields Extracted.";
                setTimeout(() => { statusBox.style.display = "none"; }, 3000);

            } catch (err) {
                console.error("Gemini Parsing Breakdown: ", err);
                statusBox.innerText = "Error parsing invoice image text.";
            }
        };
        reader.readAsDataURL(file);
    };

    // Form submission processing pipeline
    const form = document.getElementById('measureForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Submitting Entry...";
        btn.disabled = true;

        const formDataObj = new FormData(form);
        const selectedTimes = [];
        form.querySelectorAll('input[name="time"]:checked').forEach(cb => selectedTimes.push(cb.value));

        const submissionData = {
            salesperson: formDataObj.get('salesperson'),
            name: formDataObj.get('name'),
            phone: formDataObj.get('phone'),
            estimate_number: formDataObj.get('estimate_number') || "",
            address: formDataObj.get('address'),
            details: formDataObj.get('details'),
            available_days: formDataObj.get('available_days'),
            preferred_times: selectedTimes,
            confirmation: formDataObj.get('confirmation'),
            submitted_at: new Date().toLocaleString()
        };

        try {
            const cleanName = submissionData.name.trim().replace(/\s+/g, '_');
            const cleanPhone = submissionData.phone.replace(/\D/g, '') || "0000000000";
            const customID = `${cleanName}_${cleanPhone}`;

            // Resolve location coordinates securely using Google Geocoding API
            let coords = null;
            try {
                const fullAddress = `${submissionData.address}, WA`;
                const googleGeoUrl = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(fullAddress)}&key=${googleKey}`;
                
                const geoResponse = await fetch(googleGeoUrl);
                const geoData = await geoResponse.json();
                
                if (geoData.status === "OK" && geoData.results.length > 0) {
                    const loc = geoData.results[0].geometry.location;
                    coords = { lat: parseFloat(loc.lat), lon: parseFloat(loc.lng) };
                }
            } catch (geoErr) {
                console.error("Geocoding step skipped: ", geoErr);
            }

            await setDoc(doc(db, "submissions", customID), {
                ...submissionData,
                location: coords,
                timestamp: serverTimestamp()
            });

            await fetch("https://script.google.com/macros/s/AKfycbzaujNyeTmsyzjtaLIizlA4gAaDZrKC4_C73Y5fjtwo4rxAZ4XyFWisE1dyF-sMflM/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(submissionData),
                headers: { 'Content-Type': 'application/json' }
            });

            document.querySelector('.container').innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <h2 style="border:none;">Document Submitted!</h2>
                    <p style="font-size: 1.1em; color: #263238; line-height: 1.6;">The estimate sheet details have been logged and mapped successfully.</p>
                    <div style="font-size: 50px; margin-top: 20px;">📄✅</div>
                    <button onclick="location.reload()" style="background:none; color:#003399; text-decoration:underline; font-size: 0.9em; margin-top: 20px; border:none; cursor:pointer;">Process another sheet</button>
                </div>
            `;

        } catch (error) {
            console.error("Submission Error:", error);
            alert("Problem submitting data package. Please verify fields and try again.");
            btn.innerText = "Verify & Submit Request";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
