<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Auto-Fill Hub | Drafting Services</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: url('backgroundmain.png') no-repeat center center fixed; 
            background-size: cover;
            padding: 20px; 
            color: #263238;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            background: url('textbackground.jpg'), url('https://www.toptal.com/designers/subtlepatterns/uploads/paper.png');
            background-blend-mode: overlay;
            background-size: cover;
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #d7ccc8;
            border-top: 8px solid #003399; /* Corporate Blue Accent */
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }

        h2 { margin-top: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; border-bottom: 2px solid #003399; padding-bottom: 15px; text-align: center; color: #003399; }
        label { display: block; margin-top: 20px; font-weight: 700; font-size: 0.8em; color: #4e342e; text-transform: uppercase; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #bcaaa4; 
            border-radius: 4px; box-sizing: border-box; font-size: 16px; 
            background: rgba(255, 255, 255, 0.85); 
        }

        /* Scan Box UI Element */
        .scan-container {
            background: rgba(0, 51, 153, 0.04);
            border: 2px dashed #003399;
            padding: 25px 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .scan-container:hover {
            background: rgba(0, 51, 153, 0.09);
        }

        .scan-title {
            display: block;
            font-size: 0.95em;
            font-weight: bold;
            color: #003399;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #fileInput { display: none; }

        /* Status Banner */
        .status-overlay {
            display: none;
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            color: #e65100;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulseBg 1.5s infinite alternate;
        }

        @keyframes pulseBg {
            from { background: #fff3e0; }
            to { background: #ffe0b2; }
        }

        /* Salesperson Segmented Selection Grid */
        .salesperson-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .salesperson-option {
            position: relative;
            text-align: center;
        }

        .salesperson-option input {
            position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0;
        }

        .salesperson-label {
            display: block; background: rgba(255, 255, 255, 0.7); border: 1px solid #bcaaa4;
            padding: 12px 0; border-radius: 4px; font-weight: bold; color: #4e342e;
            cursor: pointer; transition: all 0.2s ease; font-size: 0.95em;
        }

        .salesperson-option input:checked + .salesperson-label {
            background: #003399;
            color: white;
            border-color: #003399;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .radio-group { 
            margin-top: 20px; background: rgba(255, 255, 255, 0.5); 
            padding: 15px; border-radius: 4px; border: 1px solid #d7ccc8; 
        }

        .time-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
        }

        .radio-option { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; font-size: 0.85em; font-weight: 500; }
        .radio-option input { width: auto; margin-top: 0; margin-right: 6px; height: 16px; width: 16px; accent-color: #003399; }

        button.submit-btn { 
            width: 100%; background: #003399; color: white; border: none; padding: 18px; 
            margin-top: 30px; border-radius: 4px; font-size: 16px; font-weight: bold; 
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: background 0.3s;
        }
        button.submit-btn:hover { background: #002266; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sales Upload Hub</h2>
    
    <div class="scan-container" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 36px;">📷</span>
        <span class="scan-title" id="boxPrompt">Snap Estimate Sheet</span>
        <input type="file" id="fileInput" accept="image/*" onchange="autoFillFromPhoto(event)">
    </div>

    <div class="status-overlay" id="statusBar">Analyzing Document Layout...</div>

    <form id="measureForm">
        
        <label>Salesperson</label>
        <div class="salesperson-grid">
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_as" value="AS" required>
                <label for="sales_as" class="salesperson-label">AS</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_bc" value="BC">
                <label for="sales_bc" class="salesperson-label">BC</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_cl" value="CL">
                <label for="sales_cl" class="salesperson-label">CL</label>
            </div>
            <div class="salesperson-option">
                <input type="radio" name="salesperson" id="sales_df" value="DF">
                <label for="sales_df" class="salesperson-label">DF</label>
            </div>
        </div>
        
        <label>Customer Name</label>
        <input type="text" name="name" id="name" placeholder="Extracting Full Name..." required>

        <label>Phone Number</label>
        <input type="tel" name="phone" id="phone" placeholder="Extracting Phone..." required>

        <label>Estimate Number (ES)</label>
        <input type="text" name="estimate_number" id="estimate_number" placeholder="Extracting ES Number...">

        <label>Address</label>
        <input type="text" name="address" id="address" placeholder="Extracting Project Address..." required>

        <label>What are we measuring?</label>
        <textarea name="details" id="details" rows="3" placeholder="Extracting project details/scope summary..."></textarea>

        <label>Days available:</label>
        <input type="text" id="datePicker" name="available_days" placeholder="Tap to select dates" required>

        <label>Preferred Times</label>
        <div class="radio-group time-grid">
            <label class="radio-option"><input type="checkbox" name="time" value="8:30 AM"> 8:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="9:00 AM"> 9:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="9:30 AM"> 9:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="10:00 AM"> 10:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="10:30 AM"> 10:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="11:00 AM"> 11:00 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="11:30 AM"> 11:30 AM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="12:00 PM"> 12:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="12:30 PM"> 12:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="1:00 PM"> 1:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="1:30 PM"> 1:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="2:00 PM"> 2:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="2:30 PM"> 2:30 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="3:00 PM"> 3:00 PM</label>
            <label class="radio-option"><input type="checkbox" name="time" value="3:30 PM"> 3:30 PM</label>
        </div>

        <input type="hidden" name="confirmation" value="Text Cell">
        <button type="submit" class="submit-btn" id="submitBtn">Verify & Confirm Request</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
      authDomain: "chickenmeasurer-37304.firebaseapp.com",
      projectId: "chickenmeasurer-37304",
      storageBucket: "chickenmeasurer-37304.firebasestorage.app",
      messagingSenderId: "871581751225",
      appId: "1:871581751225:web:bec4978ba235c1c4418868"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    flatpickr("#datePicker", {
        mode: "multiple", dateFormat: "Y-m-d", minDate: "today", altInput: true, altFormat: "F j, Y", conjunction: ", "
    });

    // Both functions share your main corporate browser gateway key safely
    const activeKey = "AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q";

    // Autonomous structural image parser pipeline
    window.autoFillFromPhoto = function(event) {
        const selectedFile = event.target.files[0];
        if (!selectedFile) return;

        document.getElementById('boxPrompt').innerText = "Document Staged";
        const stateAlert = document.getElementById('statusBar');
        stateAlert.style.display = "block";
        stateAlert.innerText = "Extracting Fields Automatically...";

        const fileReader = new FileReader();
        fileReader.onloadend = async function() {
            const rawBase64 = fileReader.result.split(',')[1];
            
            // Layout target definition matching your B&R sheet quadrants exactly
            const operationalSystemPrompt = "You are a field data transcription engine. Extract text from this B&R Flooring America corporate invoice sheet. Use these rules: 1. Find the customer name string under the 'Ship To' or 'Sold To' section blocks. 2. Find the full project target address under 'Ship To' (include street address, city, state, zip). 3. Extract the 'Quote Number' or 'Estimate' alphanumeric code string string listed on the top right area as 'es_number'. 4. Find the phone number digits string listed near customer information. 5. Summarize the items listed under Description/Inventory columns into a clean 1-line phrase (e.g. 'Living room carpet and hallway'). Respond strictly with a raw JSON data block containing the keys: 'name', 'phone', 'address', 'es_number', 'details'. Do not output any markdown code blocks or formatting tick marks, just return raw parsable text JSON.";

            // Updated client-side direct endpoint connection string
            const directApiEndpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${activeKey}`;

            const networkPayload = {
                contents: [{
                    parts: [
                        { text: operationalSystemPrompt },
                        { inlineData: { mimeType: selectedFile.type, data: rawBase64 } }
                    ]
                }]
            };

            try {
                const endpointResponse = await fetch(directApiEndpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(networkPayload)
                });
                
                const responseData = await endpointResponse.json();
                const processedText = responseData.candidates[0].content.parts[0].text.trim();
                
                // Extra security strip to remove markdown styling strings if returned
                const standardizedJson = processedText.replace(/```json/g, "").replace(/```/g, "").trim();
                const structureMap = JSON.parse(standardizedJson);

                // Auto-inject fields immediately directly into your DOM input slots
                if (structureMap.name) document.getElementById('name').value = structureMap.name;
                if (structureMap.phone) document.getElementById('phone').value = structureMap.phone;
                if (structureMap.es_number) document.getElementById('estimate_number').value = structureMap.es_number;
                if (structureMap.address) document.getElementById('address').value = structureMap.address;
                if (structureMap.details) document.getElementById('details').value = structureMap.details;

                stateAlert.innerText = "All Info Extracted Successfully!";
                setTimeout(() => { stateAlert.style.display = "none"; }, 3000);

            } catch (processingErr) {
                console.error("Data transcription pipeline break: ", processingErr);
                stateAlert.innerText = "Extraction failed. Key permissions syncing.";
            }
        };
        fileReader.readAsDataURL(selectedFile);
    };

    // Form write-out routing handler
    const form = document.getElementById('measureForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Submitting Data...";
        btn.disabled = true;

        const formDataObj = new FormData(form);
        const selectedTimes = [];
        form.querySelectorAll('input[name="time"]:checked').forEach(cb => selectedTimes.push(cb.value));

        const submissionData = {
            salesperson: formDataObj.get('salesperson'),
            name: formDataObj.get('name'),
            phone: formDataObj.get('phone'),
            estimate_number: formDataObj.get('estimate_number') || "",
            address: formDataObj.get('address'),
            details: formDataObj.get('details'),
            available_days: formDataObj.get('available_days'),
            preferred_times: selectedTimes,
            confirmation: formDataObj.get('confirmation'),
            submitted_at: new Date().toLocaleString()
        };

        try {
            const cleanName = submissionData.name.trim().replace(/\s+/g, '_');
            const cleanPhone = submissionData.phone.replace(/\D/g, '') || "0000000000";
            const customID = `${cleanName}_${cleanPhone}`;

            let coords = null;
            try {
                const fullAddress = `${submissionData.address}, WA`;
                const googleGeoUrl = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(fullAddress)}&key=${activeKey}`;
                
                const geoResponse = await fetch(googleGeoUrl);
                const geoData = await geoResponse.json();
                
                if (geoData.status === "OK" && geoData.results.length > 0) {
                    const loc = geoData.results[0].geometry.location;
                    coords = { lat: parseFloat(loc.lat), lon: parseFloat(loc.lng) };
                }
            } catch (geoErr) {
                console.error("Geocoding bypassed: ", geoErr);
            }

            await setDoc(doc(db, "submissions", customID), {
                ...submissionData,
                location: coords,
                timestamp: serverTimestamp()
            });

            await fetch("https://script.google.com/macros/s/AKfycbzaujNyeTmsyzjtaLIizlA4gAaDZrKC4_C73Y5fjtwo4rxAZ4XyFWisE1dyF-sMflM/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(submissionData),
                headers: { 'Content-Type': 'application/json' }
            });

            document.querySelector('.container').innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <h2 style="border:none;">Measure Request Created!</h2>
                    <p style="font-size: 1.1em; color: #263238; line-height: 1.6;">The auto-extracted estimate sheet data has been logged to the mapping layout.</p>
                    <div style="font-size: 50px; margin-top: 20px;">📐✅</div>
                    <button onclick="location.reload()" style="background:none; color:#003399; text-decoration:underline; font-size: 0.9em; margin-top: 20px; border:none; cursor:pointer;">Process another sheet</button>
                </div>
            `;

        } catch (error) {
            console.error("Write error block caught: ", error);
            alert("Error finalizing entry. Please verify values.");
            btn.innerText = "Verify & Confirm Request";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
