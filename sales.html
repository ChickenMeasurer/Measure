<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Entry | Chicken Measurer</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fdfaf7; 
            color: #3e2723;
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            margin: 0;
        }
        .container { 
            width: 100%;
            max-width: 500px;
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #d7ccc8;
            border-top: 8px solid #3e2723;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        h1 { 
            font-weight: 300; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #3e2723; 
            padding-bottom: 15px; 
            text-align: center; 
            color: #3e2723; 
            font-size: 1.4em;
            margin-top: 0;
        }
        label { display: block; margin-top: 15px; font-weight: 700; font-size: 0.8em; color: #4e342e; text-transform: uppercase; }
        input, textarea { 
            width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #bcaaa4; 
            border-radius: 4px; box-sizing: border-box; font-size: 15px; 
            background: rgba(255, 255, 255, 0.85); 
        }
        .room-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-option {
            display: flex;
            align-items: center;
            font-size: 0.9em;
            font-weight: 500;
        }
        .checkbox-option input { width: auto; margin-right: 8px; accent-color: #3e2723; }
        .upload-btn { 
            width: 100%; 
            background: #3e2723; 
            color: white; 
            border: none; 
            padding: 18px; 
            margin-top: 25px; 
            border-radius: 4px; 
            font-size: 15px; 
            font-weight: bold; 
            letter-spacing: 1.5px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: background 0.3s;
        }
        .upload-btn:active { background: #5d4037; }
        #status { 
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 4px; 
            background: #faf8f5; 
            border: 1px solid #bcaaa4; 
            font-size: 0.8em; 
            color: #4e342e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📤 Sales Form Entry</h1>
    
    <label>Customer Name</label>
    <input type="text" id="custName" placeholder="Client Name">

    <label>Project Address</label>
    <input type="text" id="custAddress" placeholder="Address">

    <label>Phone Number</label>
    <input type="tel" id="custPhone" placeholder="555-555-5555">

    <label>Rooms to Measure</label>
    <div class="room-grid">
        <label class="checkbox-option"><input type="checkbox" name="room" value="Whole House"> Whole House</label>
        <label class="checkbox-option"><input type="checkbox" name="room" value="Kitchen"> Kitchen</label>
        <label class="checkbox-option"><input type="checkbox" name="room" value="Bathrooms"> Bathrooms</label>
        <label class="checkbox-option"><input type="checkbox" name="room" value="Living Area"> Living Area</label>
        <label class="checkbox-option"><input type="checkbox" name="room" value="Bedrooms"> Bedrooms</label>
        <label class="checkbox-option"><input type="checkbox" name="room" value="Other"> Other</label>
    </div>

    <label>Additional Notes</label>
    <textarea id="custDetails" rows="2" placeholder="e.g., 1800 SF or specific notes..."></textarea>

    <button class="upload-btn" id="submitBtn" onclick="submitMeasure()">Submit Information</button>
    
    <div id="status">Status: Ready for input</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
      authDomain: "chickenmeasurer-37304.firebaseapp.com",
      projectId: "chickenmeasurer-37304",
      storageBucket: "chickenmeasurer-37304.firebasestorage.app",
      messagingSenderId: "871581751225",
      appId: "1:871581751225:web:bec4978ba235c1c4418868"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Make the function available globally so the onclick button works
    window.submitMeasure = async function() {
        const name = document.getElementById('custName').value;
        const address = document.getElementById('custAddress').value;
        const phone = document.getElementById('custPhone').value;
        const details = document.getElementById('custDetails').value;
        
        // Grab checked rooms
        const rooms = [];
        document.querySelectorAll('input[name="room"]:checked').forEach((cb) => {
            rooms.push(cb.value);
        });

        if(!name || !address) {
            alert("Please fill in at least the name and address.");
            return;
        }

        document.getElementById('submitBtn').innerText = "Submitting...";

        const submissionData = {
            name: name,
            address: address,
            phone: phone || "555-555-5555",
            details: rooms.length > 0 ? rooms.join(", ") : details,
            available_days: "ASAP",
            confirmation: "Text Cell",
            submitted_at: new Date().toLocaleString()
        };

        // Geocode coordinates and submit to Firebase and Email
        try {
            let coords = { lat: null, lon: null };
            const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(submissionData.address)}&limit=1`);
            const geoData = await geoResponse.json();
            if (geoData && geoData.length > 0) {
                coords.lat = parseFloat(geoData[0].lat);
                coords.lon = parseFloat(geoData[0].lon);
            }

            const cleanName = submissionData.name.trim().replace(/\s+/g, '_');
            const cleanPhone = submissionData.phone.replace(/\D/g, '');
            const customID = `${cleanName}_${cleanPhone}`;

            await setDoc(doc(db, "submissions", customID), {
                ...submissionData,
                location: coords,
                timestamp: serverTimestamp()
            });

            // Trigger Google Script
            await fetch("https://script.google.com/macros/s/AKfycbzaujNyeTmsyzjtaLIizlA4gAaDZrKC4_C73Y5fjtwo4rxAZ4XyFWisE1dyF-sMflM/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(submissionData),
                headers: { 
                    'Content-Type': 'application/json'
                }
            });

            document.getElementById('status').innerHTML = "✅ Submitted! Adding to coverage map.";
            setTimeout(() => location.reload(), 2000);

        } catch (err) {
            console.error(err);
            alert("Submission error, please try again.");
            document.getElementById('submitBtn').innerText = "Submit Information";
        }
    }
</script>
</body>
</html>
