<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Portal | Chicken Measurer</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #fdfaf7; 
            color: #3e2723;
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .container { 
            width: 100%;
            max-width: 500px;
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #d7ccc8;
            border-top: 8px solid #3e2723;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        h1 { 
            font-weight: 300; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #3e2723; 
            padding-bottom: 15px; 
            text-align: center; 
            color: #3e2723; 
            font-size: 1.5em;
        }
        p { text-align: center; color: #4e342e; font-size: 0.9em; }
        .upload-btn { 
            width: 100%; 
            background: #3e2723; 
            color: white; 
            border: none; 
            padding: 18px; 
            margin-top: 20px; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 1.5px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: background 0.3s;
        }
        .upload-btn:hover { background: #5d4037; }
        #status { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 4px; 
            background: #faf8f5; 
            border: 1px solid #bcaaa4; 
            font-size: 0.9em; 
            line-height: 1.5;
            color: #4e342e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📤 Sales Uploader</h1>
    <p>Upload or take a picture of the printed measure request form.</p>
    
    <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;">
    
    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">📸 Snap & Upload</button>
    
    <div id="status">Status: Waiting for action...</div>
</div>

<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
      authDomain: "chickenmeasurer-37304.firebaseapp.com",
      projectId: "chickenmeasurer-37304",
      storageBucket: "chickenmeasurer-37304.firebasestorage.app",
      messagingSenderId: "871581751225",
      appId: "1:871581751225:web:bec4978ba235c1c4418868",
      measurementId: "G-Q6YZZ205BG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const input = document.getElementById('imageInput');
    const status = document.getElementById('status');

    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerHTML = "🌀 <strong>Reading image data...</strong><br>Please wait while the AI scans the text.";

        try {
            // Read image text via local OCR
            const { data: { text } } = await Tesseract.recognize(file, 'eng');
            console.log("Extracted Raw Text:", text);

            // Attempt to pull the fields dynamically
            const extractedData = {
                name: text.match(/Name:\s*(.*)/i)?.[1]?.trim() || "Generated Client",
                phone: text.match(/Phone:\s*(.*)/i)?.[1]?.trim() || "555-555-5555",
                address: text.match(/Address:\s*(.*)/i)?.[1]?.trim() || "123 Default Street",
                details: text.match(/Details:\s*(.*)/i)?.[1]?.trim() || "Form details uploaded via Sales Portal.",
                available_days: "Flexible",
                confirmation: "Text Cell",
                submitted_at: new Date().toLocaleString()
            };

            status.innerHTML = `✅ <strong>Scanned successfully!</strong><br>` +
                               `Name: ${extractedData.name}<br>` +
                               `Address: ${extractedData.address}<br>` +
                               `<i>Uploading to database...</i>`;

            // Geocode the address
            let coords = { lat: null, lon: null };
            try {
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(extractedData.address)}&limit=1`);
                const geoData = await geoResponse.json();
                if (geoData && geoData.length > 0) {
                    coords.lat = parseFloat(geoData[0].lat);
                    coords.lon = parseFloat(geoData[0].lon);
                }
            } catch (err) {
                console.warn("Geocoding failed, but continuing submission.");
            }

            // Save to Firebase
            const cleanName = extractedData.name.trim().replace(/\s+/g, '_');
            const cleanPhone = extractedData.phone.replace(/\D/g, '');
            const customID = `${cleanName}_${cleanPhone}`;

            await setDoc(doc(db, "submissions", customID), {
                ...extractedData,
                location: coords,
                timestamp: serverTimestamp()
            });

            // Send Email Notification
            await fetch("https://script.google.com/macros/s/AKfycbzaujNyeTmsyzjtaLIizlA4gAaDZrKC4_C73Y5fjtwo4rxAZ4XyFWisE1dyF-sMflM/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(extractedData),
                headers: { 
                    'Content-Type': 'application/json'
                }
            });

            status.innerHTML = "🎉 <strong>Success!</strong> The measure sheet has been successfully processed and added to the map.";
            
        } catch (error) {
            console.error("Processing Error:", error);
            status.innerHTML = "❌ <strong>Error processing image.</strong> Please make sure the form text is clear and retry.";
        }
    };
</script>

</body>
</html>
