<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .map-label {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Initialize the Map (Centered on a general starting point)
        const map = L.map('map').setView([39.8283, -98.5795], 4); 

        // 2. Add the Map "Tiles" (The visual style)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Fetch data from Firebase
        async function loadMarkers() {
            const querySnapshot = await getDocs(collection(db, "submissions"));
            const bounds = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Only place a marker if we have valid coordinates
                if (data.location && data.location.lat && data.location.lon) {
                    const marker = L.marker([data.location.lat, data.location.lon]).addTo(map);
                    
                    // Create a popup with customer details
                    marker.bindPopup(`
                        <strong>${data.name}</strong><br>
                        ${data.address}<br>
                        <small>${data.details || 'No notes'}</small>
                    `);

                    bounds.push([data.location.lat, data.location.lon]);
                }
            });

            // Auto-zoom the map to fit all your pins
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        loadMarkers();
    </script>
</body>
</html>
