<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246;
        }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #3e2723;
            font-weight: bold;
            color: #3e2723;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Custom blueprint styling for the info popup interior */
        .popup-container {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 6px 10px;
            color: #3e2723;
            min-width: 180px;
        }
        
        .popup-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #3e2723;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-divider {
            border: 0; 
            border-top: 2px solid #3e2723; 
            margin: 8px 0;
            opacity: 0.3;
        }

        .popup-details {
            font-size: 0.95em;
            color: #5d4037;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>
    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.ROADMAP, // Keeps standard maps so you can see houses/buildings when zooming
            mapTypeControl: true, // Allows you to switch to Satellite view easily right on the screen
            mapTypeControlOptions: {
                style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
                position: google.maps.ControlPosition.TOP_RIGHT
            },
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } // Removes point-of-interest clutter
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        const infoWindow = new google.maps.InfoWindow();

        async function loadCoverage() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const points = []; 
                const bounds = new google.maps.LatLngBounds();
                let hasValidPoints = false;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);

                        const position = { lat: lat, lng: lng };
                        
                        const marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: data.name || 'Client'
                        });

                        // Pop-up interaction setup (Strictly hiding the street address string)
                        marker.addListener("click", () => {
                            infoWindow.setContent(`
                                <div class="popup-container">
                                    <div class="popup-title">${data.name || 'Client'}</div>
                                    <hr class="popup-divider">
                                    <div class="popup-details">
                                        <strong>Project Focus:</strong><br>
                                        ${data.details || 'No specific project notes provided.'}
                                    </div>
                                </div>
                            `);
                            infoWindow.open(map, marker);
                        });

                        points.push(turf.point([lng, lat])); 
                        bounds.extend(position);
                        hasValidPoints = true;
                    }
                });

                // Calculate and draw coverage hull
                if (points.length >= 3) {
                    const featureCollection = turf.featureCollection(points);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        const coveragePolygon = new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#d39e3a",   // Blueprint golden border
                            strokeOpacity: 0.8,
                            strokeWeight: 3,
                            fillColor: "#0b2246",     // Architectural deep blue shading
                            fillOpacity: 0.15
                        });

                        coveragePolygon.setMap(map);
                    }
                }

                if (hasValidPoints) {
                    map.fitBounds(bounds);
                    
                    const listener = google.maps.event.addListener(map, "bounds_changed", function() {
                        if (this.getZoom() > 14) {
                            this.setZoom(14); 
                        }
                        google.maps.event.removeListener(listener);
                    });
                }
            } catch (err) {
                console.error("Data could not be retrieved:", err);
            }
        }

        google.maps.event.addDomListener(window, "load", loadCoverage);
    </script>
</body>
</html>
