<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246; /* Blueprint fallback background color */
        }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #3e2723;
            font-weight: bold;
            color: #3e2723;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Clean styling for standard Google InfoWindow look */
        .popup-container {
            font-family: sans-serif;
            padding: 5px;
            color: #3e2723;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>
    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Default initial center on Lacey/Olympia area before data points calculate exact bounds
        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.ROADMAP,
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } // Cleans up map noise
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        const infoWindow = new google.maps.InfoWindow();

        async function loadCoverage() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const points = []; 
                const bounds = new google.maps.LatLngBounds();
                let hasValidPoints = false;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);

                        const position = { lat: lat, lng: lng };
                        
                        // Drop a native Google Map Marker pin
                        const marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: data.name || 'Client'
                        });

                        // Attach info window click sequence
                        marker.addListener("click", () => {
                            infoWindow.setContent(`
                                <div class="popup-container">
                                    <strong style="color: #3e2723;">${data.name || 'Client'}</strong><br>
                                    <span style="font-size:0.9em; color:#6d4c41;">${data.address || ''}</span>
                                    <hr style="border: 0; border-top: 1px solid #ddd; margin: 8px 0;">
                                    <small>${data.details || 'No project notes.'}</small>
                                </div>
                            `);
                            infoWindow.open(map, marker);
                        });

                        // Save geometry objects for framing and Hull tracking loops
                        points.push(turf.point([lng, lat])); // Turf coordinates expect [longitude, latitude]
                        bounds.extend(position);
                        hasValidPoints = true;
                    }
                });

                // Calculate and draw the coverage perimeter line if we have at least 3 pins
                if (points.length >= 3) {
                    const featureCollection = turf.featureCollection(points);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        // Extract array and map them straight into Google MVC coordinate objects
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        // Generate Blueprint stylized overlay polygon hull
                        const coveragePolygon = new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#d39e3a",   // Blueprint orange/yellow stroke border line
                            strokeOpacity: 0.7,
                            strokeWeight: 3,
                            fillColor: "#0b2246",     // Deep architectural blueprint overlay fill
                            fillOpacity: 0.18
                        });

                        coveragePolygon.setMap(map);
                    }
                }

                // Smooth fit view windows around the active boundary coordinates
                if (hasValidPoints) {
                    map.fitBounds(bounds);
                    
                    // Add a slight padding buffer to the auto-zoom calculation
                    const listener = google.maps.event.addListener(map, "bounds_changed", function() {
                        if (this.getZoom() > 14) {
                            this.setZoom(14); // Prevents over-zooming on an isolated point entry
                        }
                        google.maps.event.removeListener(listener);
                    });
                }
            } catch (err) {
                console.error("Data could not be retrieved from database collection:", err);
            }
        }

        // Run map build pipeline on window initialization
        google.maps.event.addDomListener(window, "load", loadCoverage);
    </script>
</body>
</html>
