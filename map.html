<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #3e2723;
            font-weight: bold;
            color: #3e2723;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Styling the popup to match your drafting theme */
        .leaflet-popup-content-wrapper {
            background: #fdfaf7;
            color: #3e2723;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage Blanket</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868",
            measurementId: "G-Q6YZZ205BG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Initialize Map
        const map = L.map('map').setView([47.0379, -122.9007], 10); // Centered near Olympia

        // 2. Add Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function loadCoverage() {
            const querySnapshot = await getDocs(collection(db, "submissions"));
            const points = []; 
            const bounds = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                if (data.location && data.location.lat && data.location.lon) {
                    const lat = data.location.lat;
                    const lon = data.location.lon;


// Place individual pins
const marker = L.marker([lat, lon]).addTo(map);
marker.bindPopup(`
    <div style="font-family: sans-serif;">
        <strong style="color: #3e2723;">${data.name || 'Client'}</strong><br>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 5px 0;">
        <small>${data.details || 'No project notes.'}</small>
    </div>
`);


                    // Add to our "Blanket" coordinate list (Turf uses [lon, lat])
                    points.push(turf.point([lon, lat]));
                    bounds.push([lat, lon]);
                }
            });

            // 3. Draw the "Blanket" (Convex Hull)
            if (points.length >= 3) {
                const featureCollection = turf.featureCollection(points);
                const hull = turf.convex(featureCollection);

                if (hull) {
                    L.geoJSON(hull, {
                        style: {
                            color: '#3e2723',       // Border color
                            weight: 3,
                            opacity: 0.6,
                            fillColor: '#8b4513',  // Blanket fill color
                            fillOpacity: 0.25      // Transparency
                        }
                    }).addTo(map);
                }
            }

            // Auto-zoom to fit the blanket
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [80, 80] });
            }
        }

        loadCoverage();
    </script>
</body>
</html>
