<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246;
        }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #003399;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- Dashboard Container --- */
        .dashboard-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .dashboard-toggle {
            background: #003399;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .dashboard-toggle:hover {
            background: #002266;
        }

        .dashboard-content {
            display: none; /* Hidden by default */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            width: 265px;
            margin-top: 10px;
            border-top: 5px solid #003399;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .dashboard-header {
            background: #f5f5f5;
            padding: 12px 15px;
            font-weight: bold;
            color: #003399;
            border-bottom: 1px solid #ddd;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Salesperson Filter Dropdown styling */
        .salesperson-select {
            padding: 4px 8px;
            font-size: 0.9em;
            font-weight: bold;
            color: #003399;
            border: 1px solid #003399;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .stats-list {
            padding: 10px 15px;
            margin: 0;
            list-style: none;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95em;
            color: #263238;
            border-bottom: 1px dashed #e0e0e0;
        }

        /* Highlighting total homes metric */
        .stats-item.total-homes {
            border-bottom: 2px solid #003399;
            padding-bottom: 8px;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .stats-item:last-child {
            border-bottom: none;
        }

        .stats-count {
            font-weight: bold;
            color: #b71c1c; /* Brand Accent Red */
        }

        /* --- Custom InfoWindow Snug Wrap CSS --- */
        .gm-style .gm-style-iw-c {
            padding: 10px !important;
            max-height: none !important;
        }
        
        .gm-style .gm-style-iw-d {
            overflow: hidden !important;
            max-height: none !important;
        }

        .popup-container {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 2px 5px 0px 5px;
            color: #263238;
            min-width: 180px;
        }
        
        .popup-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-divider {
            border: 0; 
            border-top: 2px solid #b71c1c;
            margin: 6px 0;
            opacity: 0.8;
        }

        .popup-details {
            font-size: 0.95em;
            color: #b71c1c;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>
    
    <div class="dashboard-container">
        <button class="dashboard-toggle" id="toggleBtn" onclick="toggleDashboard()">📊 View Stats</button>
        <div class="dashboard-content" id="dbContent">
            <div class="dashboard-header">
                <span>Stats For:</span>
                <select class="salesperson-select" id="salesFilter" onchange="filterStats()">
                    <option value="TOTAL">Total</option>
                    <option value="AS">AS</option>
                    <option value="BC">BC</option>
                    <option value="CL">CL</option>
                    <option value="DF">DF</option>
                </select>
            </div>
            <ul class="stats-list">
                <li class="stats-item total-homes">Total Homes Visited <span class="stats-count" id="count-total-visits">0</span></li>
                <li class="stats-item">Whole Houses <span class="stats-count" id="count-house">0</span></li>
                <li class="stats-item">Kitchens <span class="stats-count" id="count-kitchen">0</span></li>
                <li class="stats-item">Bedrooms <span class="stats-count" id="count-bedroom">0</span></li>
                <li class="stats-item">Bathrooms <span class="stats-count" id="count-bathroom">0</span></li>
                <li class="stats-item">Living Rooms <span class="stats-count" id="count-living">0</span></li>
                <li class="stats-item">Hallways <span class="stats-count" id="count-hallway">0</span></li>
                <li class="stats-item">Closets <span class="stats-count" id="count-closet">0</span></li>
                <li class="stats-item">Staircases <span class="stats-count" id="count-stairs">0</span></li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.ROADMAP, 
            mapTypeControl: true, 
            mapTypeControlOptions: {
                style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
                position: google.maps.ControlPosition.TOP_RIGHT
            },
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } 
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        const infoWindow = new google.maps.InfoWindow();

        // Dashboard Visibility Toggle
        window.toggleDashboard = function() {
            const content = document.getElementById("dbContent");
            const btn = document.getElementById("toggleBtn");
            if (content.style.display === "block") {
                content.style.display = "none";
                btn.innerText = "📊 View Stats";
            } else {
                content.style.display = "block";
                btn.innerText = "✖ Close Stats";
            }
        };

        // Master store to cache raw data parsed directly from Firestore
        let allSubmissionsData = [];

        // Dynamic multi-tier mapping function to process room tags
        function calculateStatsForFilter(targetSalesperson) {
            const counts = { visits: 0, house: 0, kitchen: 0, bedroom: 0, bathroom: 0, living: 0, hallway: 0, closet: 0, stairs: 0 };

            allSubmissionsData.forEach(item => {
                // Filter validation check
                if (targetSalesperson !== "TOTAL" && item.salesperson !== targetSalesperson) {
                    return; 
                }

                counts.visits++; // Increments the specific or group volume visit count

                if (item.details) {
                    const txt = item.details.toLowerCase();
                    if (txt.includes("whole house") || txt.includes("entire home") || txt.includes("full house")) counts.house++;
                    if (txt.includes("kitchen") || txt.includes("counter") || txt.includes("backsplash")) counts.kitchen++;
                    if (txt.includes("bedroom") || txt.includes("bed room") || txt.includes("primary bed")) counts.bedroom++;
                    if (txt.includes("bath") || txt.includes("restroom") || txt.includes("powder room")) counts.bathroom++;
                    if (txt.includes("living") || txt.includes("family room") || txt.includes("great room") || txt.includes("den")) counts.living++;
                    if (txt.includes("hall") || txt.includes("entryway") || txt.includes("foyer")) counts.hallway++;
                    if (txt.includes("closet") || txt.includes("wic")) counts.closet++;
                    if (txt.includes("stair") || txt.includes("steps") || txt.includes("flight")) counts.stairs++;
                }
            });

            // Update DOM Elements
            document.getElementById("count-total-visits").innerText = counts.visits;
            document.getElementById("count-house").innerText = counts.house;
            document.getElementById("count-kitchen").innerText = counts.kitchen;
            document.getElementById("count-bedroom").innerText = counts.bedroom;
            document.getElementById("count-bathroom").innerText = counts.bathroom;
            document.getElementById("count-living").innerText = counts.living;
            document.getElementById("count-hallway").innerText = counts.hallway;
            document.getElementById("count-closet").innerText = counts.closet;
            document.getElementById("count-stairs").innerText = counts.stairs;
        }

        // Dropdown interactive handler callback
        window.filterStats = function() {
            const selectedFilter = document.getElementById("salesFilter").value;
            calculateStatsForFilter(selectedFilter);
        };

        async function loadCoverage() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const points = []; 
                const bounds = new google.maps.LatLngBounds();
                let hasValidPoints = false;

                allSubmissionsData = []; // Clear array cache before filling

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Push structured items into our global cache array
                    allSubmissionsData.push({
                        salesperson: data.salesperson || null, // Handles older records gracefully
                        details: data.details || ""
                    });
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);
                        const position = { lat: lat, lng: lng };
                        
                        const marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: data.name || 'Client'
                        });

                        marker.addListener("click", () => {
                            infoWindow.setContent(`
                                <div class="popup-container">
                                    <div class="popup-title">${data.name || 'Client'}</div>
                                    <hr class="popup-divider">
                                    <div class="popup-details">
                                        <strong>Project Focus:</strong><br>
                                        ${data.details || 'No specific project notes.'}
                                    </div>
                                </div>
                            `);
                            infoWindow.open(map, marker);
                        });

                        points.push(turf.point([lng, lat])); 
                        bounds.extend(position);
                        hasValidPoints = true;
                    }
                });

                // Compute overall totals immediately on map initialization
                calculateStatsForFilter("TOTAL");

                map.addListener("click", () => {
                    infoWindow.close();
                });

                if (points.length >= 3) {
                    const featureCollection = turf.featureCollection(points);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        const coveragePolygon = new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#003399",   
                            strokeOpacity: 0.8,
                            strokeWeight: 3,
                            fillColor: "#003399",     
                            fillOpacity: 0.12
                        });

                        coveragePolygon.setMap(map);
                    }
                }

                if (hasValidPoints) {
                    map.fitBounds(bounds);
                    
                    const listener = google.maps.event.addListener(map, "bounds_changed", function() {
                        if (this.getZoom() > 14) {
                            this.setZoom(14); 
                        }
                        google.maps.event.removeListener(listener);
                    });
                }
            } catch (err) {
                console.error("Data could not be retrieved:", err);
            }
        }

        google.maps.event.addDomListener(window, "load", loadCoverage);
    </script>
</body>
</html>
