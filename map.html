<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246;
        }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #003399;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- New Modern Scoreboard Dashboard Panel --- */
        .scoreboard-panel {
            position: absolute;
            top: 20px;
            right: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            width: 260px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-top: 5px solid #003399;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .scoreboard-header {
            padding: 12px 15px;
            background: #fdfaf7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e0e0e0;
        }

        .scoreboard-header:hover {
            background: #f5efe9;
        }

        .scoreboard-toggle-icon {
            font-size: 14px;
            transition: transform 0.3s;
            color: #b71c1c;
        }

        .scoreboard-content {
            padding: 15px;
            display: block;
            transition: max-height 0.3s ease-out;
            max-height: 300px;
        }

        /* Hidden state class */
        .scoreboard-panel.collapsed .scoreboard-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            display: none;
        }

        .scoreboard-panel.collapsed .scoreboard-toggle-icon {
            transform: rotate(-90deg);
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #263238;
        }
        
        .stat-line:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            font-weight: 500;
        }

        .stat-count {
            font-weight: bold;
            background: #b71c1c;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            min-width: 20px;
            text-align: center;
        }

        /* --- Custom InfoWindow Snug Wrap CSS --- */
        .gm-style .gm-style-iw-c {
            padding: 10px !important;
            max-height: none !important;
        }
        
        .gm-style .gm-style-iw-d {
            overflow: hidden !important;
            max-height: none !important;
        }

        .popup-container {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 2px 5px 0px 5px;
            color: #263238;
            min-width: 180px;
        }
        
        .popup-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-divider {
            border: 0; 
            border-top: 2px solid #b71c1c;
            margin: 6px 0;
            opacity: 0.8;
        }

        .popup-details {
            font-size: 0.95em;
            color: #b71c1c;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>

    <div class="scoreboard-panel" id="scoreboardPanel">
        <div class="scoreboard-header" onclick="toggleScoreboard()">
            <span>📊 Drafting Metrics</span>
            <span class="scoreboard-toggle-icon" id="toggleIcon">▼</span>
        </div>
        <div class="scoreboard-content">
            <div class="stat-line">
                <span class="stat-label">Bedrooms Measured</span>
                <span class="stat-count" id="countBedrooms">0</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">Living Rooms Measured</span>
                <span class="stat-count" id="countLiving">0</span>
            </div>
            <div class="stat-line">
                <span class="stat-label">Whole Houses Mapped</span>
                <span class="stat-count" id="countWhole">0</span>
            </div>
            <div class="stat-line" style="margin-top: 12px; padding-top: 8px; border-top: 1px dashed #d7ccc8;">
                <span class="stat-label" style="font-weight: bold; color: #003399;">Total Sites Surveyed</span>
                <span class="stat-count" id="countTotal" style="background: #003399;">0</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Keep scoreboard panel functional globally
        window.toggleScoreboard = function() {
            const panel = document.getElementById("scoreboardPanel");
            panel.classList.toggle("collapsed");
        };

        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.ROADMAP, 
            mapTypeControl: true, 
            mapTypeControlOptions: {
                style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
                position: google.maps.ControlPosition.TOP_LEFT // Shifted slightly so it won't conflict with panel
            },
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } 
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        const infoWindow = new google.maps.InfoWindow();

        // --- FIX: Click Map to Close Active Info Window ---
        map.addListener("click", () => {
            infoWindow.close();
        });

        async function loadCoverage() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const points = []; 
                const bounds = new google.maps.LatLngBounds();
                let hasValidPoints = false;

                // Scoreboard tally variables
                let bedroomTotal = 0;
                let livingTotal = 0;
                let wholeTotal = 0;
                let overallSites = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);
                        const position = { lat: lat, lng: lng };
                        
                        overallSites++;

                        // Extract project detail context to scan for metric milestones
                        const textDetails = (data.details || "").toLowerCase();
                        
                        if (textDetails.includes("bedroom") || textDetails.includes("bed")) bedroomTotal++;
                        if (textDetails.includes("living") || textDetails.includes("family room")) livingTotal++;
                        if (textDetails.includes("whole") || textDetails.includes("entire") || textDetails.includes("house")) wholeTotal++;

                        const marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: data.name || 'Client'
                        });

                        marker.addListener("click", () => {
                            infoWindow.setContent(`
                                <div class="popup-container">
                                    <div class="popup-title">${data.name || 'Client'}</div>
                                    <hr class="popup-divider">
                                    <div class="popup-details">
                                        <strong>Project Focus:</strong><br>
                                        ${data.details || 'No specific project notes.'}
                                    </div>
                                </div>
                            `);
                            infoWindow.open(map, marker);
                        });

                        points.push(turf.point([lng, lat])); 
                        bounds.extend(position);
                        hasValidPoints = true;
                    }
                });

                // Update UI numbers safely
                document.getElementById("countBedrooms").innerText = bedroomTotal;
                document.getElementById("countLiving").innerText = livingTotal;
                document.getElementById("countWhole").innerText = wholeTotal;
                document.getElementById("countTotal").innerText = overallSites;

                if (points.length >= 3) {
                    const featureCollection = turf.featureCollection(points);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        const coveragePolygon = new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#003399",   
                            strokeOpacity: 0.8,
                            strokeWeight: 3,
                            fillColor: "#003399",     
                            fillOpacity: 0.12
                        });

                        coveragePolygon.setMap(map);
                    }
                }

                if (hasValidPoints) {
                    map.fitBounds(bounds);
                    
                    const listener = google.maps.event.addListener(map, "bounds_changed", function() {
                        if (this.getZoom() > 14) {
                            this.setZoom(14); 
                        }
                        google.maps.event.removeListener(listener);
                    });
                }
            } catch (err) {
                console.error("Data could not be retrieved:", err);
            }
        }

        google.maps.event.addDomListener(window, "load", loadCoverage);
    </script>
</body>
</html>
