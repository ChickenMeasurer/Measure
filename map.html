<!DOCTYPE html>
<html>
<head>
    <title>Coverage Map | Drafting Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246;
        }
        
        .map-label {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 5px solid #003399;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- Toggleable Dashboard Styling --- */
        .dashboard-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .dashboard-toggle {
            background: #003399;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .dashboard-toggle:hover {
            background: #002266;
        }

        .dashboard-content {
            display: none; /* Hidden by default */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            width: 260px;
            margin-top: 10px;
            border-top: 5px solid #003399;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .dashboard-header {
            background: #f5f5f5;
            padding: 10px 15px;
            font-weight: bold;
            color: #003399;
            border-bottom: 1px solid #ddd;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .stats-list {
            padding: 10px 15px;
            margin: 0;
            list-style: none;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95em;
            color: #263238;
            border-bottom: 1px dashed #e0e0e0;
        }

        .stats-item:last-child {
            border-bottom: none;
        }

        .stats-count {
            font-weight: bold;
            color: #b71c1c; /* Brand Accent Red */
        }

        /* --- Custom InfoWindow Snug Wrap CSS --- */
        .gm-style .gm-style-iw-c {
            padding: 10px !important;
            max-height: none !important;
        }
        
        .gm-style .gm-style-iw-d {
            overflow: hidden !important;
            max-height: none !important;
        }

        .popup-container {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 2px 5px 0px 5px;
            color: #263238;
            min-width: 180px;
        }
        
        .popup-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #003399;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .popup-divider {
            border: 0; 
            border-top: 2px solid #b71c1c;
            margin: 6px 0;
            opacity: 0.8;
        }

        .popup-details {
            font-size: 0.95em;
            color: #b71c1c;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="map-label">📐 Measurement Coverage</div>
    
    <div class="dashboard-container">
        <button class="dashboard-toggle" id="toggleBtn" onclick="toggleDashboard()">📊 View Stats</button>
        <div class="dashboard-content" id="dbContent">
            <div class="dashboard-header">Total Scanned Areas</div>
            <ul class="stats-list">
                <li class="stats-item">Whole Houses <span class="stats-count" id="count-house">0</span></li>
                <li class="stats-item">Kitchens <span class="stats-count" id="count-kitchen">0</span></li>
                <li class="stats-item">Bedrooms <span class="stats-count" id="count-bedroom">0</span></li>
                <li class="stats-item">Bathrooms <span class="stats-count" id="count-bathroom">0</span></li>
                <li class="stats-item">Living Rooms <span class="stats-count" id="count-living">0</span></li>
                <li class="stats-item">Hallways <span class="stats-count" id="count-hallway">0</span></li>
                <li class="stats-item">Closets <span class="stats-count" id="count-closet">0</span></li>
                <li class="stats-item">Staircases <span class="stats-count" id="count-stairs">0</span></li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.ROADMAP, 
            mapTypeControl: true, 
            mapTypeControlOptions: {
                style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
                position: google.maps.ControlPosition.TOP_RIGHT
            },
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } 
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        const infoWindow = new google.maps.InfoWindow();

        // Dashboard Toggle UI Logic
        window.toggleDashboard = function() {
            const content = document.getElementById("dbContent");
            const btn = document.getElementById("toggleBtn");
            if (content.style.display === "block") {
                content.style.display = "none";
                btn.innerText = "📊 View Stats";
            } else {
                content.style.display = "block";
                btn.innerText = "✖ Close Stats";
            }
        };

        // Object tracking our total counts across all documents
        const roomStats = {
            house: 0,
            kitchen: 0,
            bedroom: 0,
            bathroom: 0,
            living: 0,
            hallway: 0,
            closet: 0,
            stairs: 0
        };

        // Text parsing function to search form details for room keywords
        function parseRoomDetails(text) {
            if (!text) return;
            const cleanText = text.toLowerCase();

            if (cleanText.includes("whole house") || cleanText.includes("entire home") || cleanText.includes("full house")) roomStats.house++;
            if (cleanText.includes("kitchen") || cleanText.includes("counter") || cleanText.includes("backsplash")) roomStats.kitchen++;
            if (cleanText.includes("bedroom") || cleanText.includes("bed room") || cleanText.includes("primary bed")) roomStats.bedroom++;
            if (cleanText.includes("bath") || cleanText.includes("restroom") || cleanText.includes("powder room")) roomStats.bathroom++;
            if (cleanText.includes("living") || cleanText.includes("family room") || cleanText.includes("great room") || cleanText.includes("den")) roomStats.living++;
            if (cleanText.includes("hall") || cleanText.includes("entryway") || cleanText.includes("foyer")) roomStats.hallway++;
            if (cleanText.includes("closet") || cleanText.includes("wic")) roomStats.closet++;
            if (cleanText.includes("stair") || cleanText.includes("steps") || cleanText.includes("flight")) roomStats.stairs++;
        }

        // Display results to UI elements
        function updateStatsUI() {
            document.getElementById("count-house").innerText = roomStats.house;
            document.getElementById("count-kitchen").innerText = roomStats.kitchen;
            document.getElementById("count-bedroom").innerText = roomStats.bedroom;
            document.getElementById("count-bathroom").innerText = roomStats.bathroom;
            document.getElementById("count-living").innerText = roomStats.living;
            document.getElementById("count-hallway").innerText = roomStats.hallway;
            document.getElementById("count-closet").innerText = roomStats.closet;
            document.getElementById("count-stairs").innerText = roomStats.stairs;
        }

        async function loadCoverage() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const points = []; 
                const bounds = new google.maps.LatLngBounds();
                let hasValidPoints = false;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Run text parsing on every detail description found
                    if (data.details) {
                        parseRoomDetails(data.details);
                    }
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);

                        const position = { lat: lat, lng: lng };
                        
                        const marker = new google.maps.Marker({
                            position: position,
                            map: map,
                            title: data.name || 'Client'
                        });

                        marker.addListener("click", () => {
                            infoWindow.setContent(`
                                <div class="popup-container">
                                    <div class="popup-title">${data.name || 'Client'}</div>
                                    <hr class="popup-divider">
                                    <div class="popup-details">
                                        <strong>Project Focus:</strong><br>
                                        ${data.details || 'No specific project notes.'}
                                    </div>
                                </div>
                            `);
                            infoWindow.open(map, marker);
                        });

                        points.push(turf.point([lng, lat])); 
                        bounds.extend(position);
                        hasValidPoints = true;
                    }
                });

                // Render matching scoreboard stats values onto the screen
                updateStatsUI();

                // Close popups when clicking map background anywhere outside a pin
                map.addListener("click", () => {
                    infoWindow.close();
                });

                if (points.length >= 3) {
                    const featureCollection = turf.featureCollection(points);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        const coveragePolygon = new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#003399",   
                            strokeOpacity: 0.8,
                            strokeWeight: 3,
                            fillColor: "#003399",     
                            fillOpacity: 0.12
                        });

                        coveragePolygon.setMap(map);
                    }
                }

                if (hasValidPoints) {
                    map.fitBounds(bounds);
                    
                    const listener = google.maps.event.addListener(map, "bounds_changed", function() {
                        if (this.getZoom() > 14) {
                            this.setZoom(14); 
                        }
                        google.maps.event.removeListener(listener);
                    });
                }
            } catch (err) {
                console.error("Data could not be retrieved:", err);
            }
        }

        google.maps.event.addDomListener(window, "load", loadCoverage);
    </script>
</body>
</html>
