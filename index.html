<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Measure | Drafting Services</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            /* Main Background: Your Dark Wood/Flooring Image */
            background: url('https://www.bandrflooringamerica.com/images/page1_img1.jpg') no-repeat center center fixed; 
            background-size: cover;
            padding: 20px; 
            color: #263238;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%;
            max-width: 500px; 
            /* Light Wood Texture for the Form Background */
            background: url('https://www.toptal.com/designers/subtlepatterns/uploads/paper.png'), url('https://images.unsplash.com/photo-1546487817-5cb73461665e?auto=format&fit=crop&q=60&w=800');
            background-blend-mode: overlay;
            background-size: cover;
            
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #d7ccc8; /* Subtle wood-colored border */
            border-top: 8px solid #3e2723; /* Darker accent top border */
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }

        h2 { 
            margin-top: 0; 
            font-weight: 300; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #3e2723; 
            padding-bottom: 15px; 
            text-align: center; 
            color: #3e2723; /* Dark brown text for header */
        }

        label { display: block; margin-top: 20px; font-weight: 700; font-size: 0.8em; color: #4e342e; text-transform: uppercase; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #bcaaa4; 
            border-radius: 4px; box-sizing: border-box; font-size: 16px; 
            background: rgba(255, 255, 255, 0.85); /* Keeps input fields clean and bright */
        }

        .radio-group { 
            margin-top: 20px; 
            background: rgba(255, 255, 255, 0.5); 
            padding: 15px; 
            border-radius: 4px; 
            border: 1px solid #d7ccc8; 
        }

        .radio-option { display: flex; align-items: center; margin-bottom: 12px; cursor: pointer; font-size: 0.95em; font-weight: 500; }
        .radio-option input { width: auto; margin-top: 0; margin-right: 12px; height: 18px; width: 18px; accent-color: #3e2723; }

        button { 
            width: 100%; background: #3e2723; color: white; border: none; padding: 18px; 
            margin-top: 30px; border-radius: 4px; font-size: 16px; font-weight: bold; 
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: background 0.3s;
        }
        button:hover { background: #5d4037; }
    </style>
</head>
<body>

<div class="container">
    <h2>Request a Measure</h2>
    <form action="https://formspree.io/f/xykllwny" method="POST">
        
        <label>Customer Name</label>
        <input type="text" name="name" placeholder="Full Name" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="(555) 555-5555" required>

        <label>Address</label>
        <input type="text" name="address" placeholder="Project Address" required>

        <label>What are we measuring?</label>
        <textarea name="details" rows="3" placeholder="e.g., Kitchen countertops, 1/4 inch floor plan check..."></textarea>

        <label>Days you are available:</label>
        <input type="text" id="datePicker" name="available_days" placeholder="Tap to select dates" required>

        <label>Preferred Time</label>
        <select name="preferred_time" required>
            <option value="" disabled selected>Select a time...</option>
            <option value="8:30 AM">8:30 AM</option>
            <option value="9:00 AM">9:00 AM</option>
            <option value="10:00 AM">10:00 AM</option>
            <option value="11:00 AM">11:00 AM</option>
            <option value="12:00 PM">12:00 PM</option>
            <option value="1:00 PM">1:00 PM</option>
            <option value="2:00 PM">2:00 PM</option>
            <option value="3:00 PM">3:00 PM</option>
        </select>

        <div class="radio-group">
            <label style="margin-top:0; padding-bottom:10px;">Confirmation Preference</label>
            <label class="radio-option">
                <input type="radio" name="confirmation" value="Text Cell" checked> 
                This is a cell phone, please text to confirm.
            </label>
            <label class="radio-option">
                <input type="radio" name="confirmation" value="Phone Call"> 
                I would prefer a phone call to confirm.
            </label>
        </div>

        <button type="submit">Submit Request</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    flatpickr("#datePicker", {
        mode: "multiple",
        dateFormat: "Y-m-d",
        minDate: "today",
        altInput: true,
        altFormat: "F j, Y",
        conjunction: ", "
    });
</script>

<script>
    const form = document.querySelector('form');
    const container = document.querySelector('.container');

    // Add your custom messages here!
    const messages = [
        "Got it! I'm sharpening my pencils and checking the schedule. I'll be in touch soon!",
        "Request received! Time to pull out the 1/4 inch scale. I'll reach out shortly.",
        "Success! I've added your details to my clipboard. Expect a confirmation soon!"
    ];

    form.onsubmit = async (e) => {
        e.preventDefault(); // Stop the page from reloading
        
        const formData = new FormData(form);
        const submitButton = form.querySelector('button');
        submitButton.innerText = "Sending...";
        submitButton.disabled = true;

        // Send data to Formspree in the background
        const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
            // Pick a random message
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            // Swap the form for the Thank You message
            container.innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <h2 style="border:none;">Drawing Sent!</h2>
                    <p style="font-size: 1.2em; color: #4e342e; line-height: 1.6;">${randomMessage}</p>
                    <div style="font-size: 50px; margin-top: 20px;">📐✅</div>
                    <button onclick="location.reload()" style="background:none; color:#3e2723; text-decoration:underline; font-size: 0.8em; margin-top: 20px; border:none; cursor:pointer;">Send another request</button>
                </div>
            `;
        } else {
            alert("Oops! There was a problem. Please try again.");
            submitButton.innerText = "Submit Request";
            submitButton.disabled = false;
        }
    };
</script>
    
    
</body>
</html>
