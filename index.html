<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Fighters | Project Submission</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #121212; color: white; }
        form { display: flex; flex-direction: column; max-width: 400px; gap: 15px; }
        input, textarea, button { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; font-size: 16px; }
        button { background-color: #4CAF50; cursor: pointer; font-weight: bold; border: none; margin-top: 10px; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .status { margin-top: 15px; font-weight: bold; }
        h2 { color: #4CAF50; }
    </style>
</head>
<body>

    <h2>Project Submission</h2>
    <p>Database: Firebase | Alerts: Formspree</p>
    
    <form id="submissionForm">
        <input type="text" id="name" placeholder="Customer Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="text" id="address" placeholder="Property Address" required>
        <textarea id="details" placeholder="Measurements & Project Details" rows="5"></textarea>
        <button type="submit" id="submitBtn">Submit Project</button>
    </form>

    <div id="status" class="status"></div>

    <script type="module">
        // Import Firebase SDKs from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868",
            measurementId: "G-Q6YZZ205BG"
        };

        // Initialize Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('submissionForm');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button to prevent double-clicks while driving/on mobile
            submitBtn.disabled = true;
            statusDiv.style.color = "#FFD700";
            statusDiv.textContent = "Syncing with Database & Email...";

            const formData = {
                customer_name: document.getElementById('name').value,
                phone_number: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                project_details: document.getElementById('details').value,
                submitted_at: new Date().toLocaleString(),
                source: "FloorFighters_Mobile_Field"
            };

            try {
                // 1. Double Dip Part One: Save to Firebase Firestore
                const docRef = await addDoc(collection(db, "submissions"), {
                    ...formData,
                    timestamp: serverTimestamp() // Official DB timestamp
                });
                console.log("Firestore Saved ID:", docRef.id);

                // 2. Double Dip Part Two: Trigger Formspree Email
                await fetch("https://formspree.io/f/xykllwny", {
                    method: "POST",
                    body: JSON.stringify(formData),
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });

                // Success Message
                statusDiv.style.color = "#4CAF50";
                statusDiv.textContent = "Success! Database updated and email sent.";
                form.reset();

            } catch (error) {
                console.error("Critical Error:", error);
                statusDiv.style.color = "#ff5252";
                statusDiv.textContent = "Error: " + error.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
