<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Measurement & Scheduling</title>
    <style>
        body { 
            background: url('https://images.unsplash.com/photo-1589939705384-5185137a7f0f?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.96);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 480px;
            border-top: 10px solid #5D2E0A;
        }

        h2 { color: #333; text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        form { display: flex; flex-direction: column; gap: 12px; }

        .input-group { display: flex; flex-direction: column; }
        
        label { font-weight: bold; color: #444; font-size: 0.85em; margin-bottom: 4px; }

        input, textarea, select { 
            padding: 12px; 
            border: 1px solid #bbb; 
            border-radius: 4px; 
            font-size: 16px;
            background: #fff;
        }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button { 
            background-color: #8B4513; 
            color: white; 
            padding: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background-color: #999; }

        #status { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Schedule Measurement</h2>
        <form id="submissionForm">
            <div class="input-group">
                <label>CUSTOMER NAME</label>
                <input type="text" id="name" placeholder="Full Name" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>PHONE</label>
                    <input type="tel" id="phone" placeholder="(555) 000-0000" required>
                </div>
                <div class="input-group">
                    <label>SITE ADDRESS</label>
                    <input type="text" id="address" placeholder="Address" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>PREFERRED DATE</label>
                    <input type="date" id="prefDate" required>
                </div>
                <div class="input-group">
                    <label>PREFERRED TIME</label>
                    <input type="time" id="prefTime" required>
                </div>
            </div>

            <div class="input-group">
                <label>PROJECT DETAILS / NOTES</label>
                <textarea id="details" placeholder="Countertops, backsplash, flooring info..." rows="3"></textarea>
            </div>

            <button type="submit" id="submitBtn">CONFIRM & SUBMIT</button>
        </form>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868",
            measurementId: "G-Q6YZZ205BG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const form = document.getElementById('submissionForm');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            statusDiv.style.color = "#444";
            statusDiv.textContent = "Updating database and sending email...";

            const formData = {
                customer_name: document.getElementById('name').value,
                phone_number: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                scheduled_date: document.getElementById('prefDate').value,
                scheduled_time: document.getElementById('prefTime').value,
                project_details: document.getElementById('details').value,
                submitted_at: new Date().toLocaleString()
            };

            try {
                // 1. Firebase (Data Storage)
                await addDoc(collection(db, "submissions"), {
                    ...formData,
                    timestamp: serverTimestamp()
                });

                // 2. Formspree (Instant Notification)
                await fetch("https://formspree.io/f/xykllwny", {
                    method: "POST",
                    body: JSON.stringify(formData),
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });

                statusDiv.style.color = "green";
                statusDiv.textContent = "✓ Success! Saved and Scheduled.";
                form.reset();
            } catch (error) {
                statusDiv.style.color = "red";
                statusDiv.textContent = "Error: " + error.message;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
