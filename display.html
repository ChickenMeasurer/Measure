<!DOCTYPE html>
<html>
<head>
    <title>Drafting Service Kiosk | Live Coverage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background-color: #0b2246;
        }
        
        /* High-tech Kiosk Overlay Styling */
        .kiosk-label {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 1000;
            background: rgba(11, 34, 70, 0.9); /* Deep Brand Blue */
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 5px solid #b71c1c; /* Accent Red */
            color: white;
        }

        .kiosk-title {
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .kiosk-sub {
            font-size: 0.8em;
            color: #d39e3a;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Pulsing recording light indicator effect */
        .live-pulse {
            width: 8px;
            height: 8px;
            background: #2e7d32;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 125, 50, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
        }
    </style>
</head>
<body>

    <div class="kiosk-label">
        <div class="kiosk-title">Active Operations Map</div>
        <div class="kiosk-sub"><span class="live-pulse"></span> Kiosk Autopilot Mode Active</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhbo0ldo8ZKcgMFprwszG720RykvvWO7Q"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIJQhVB5X9WLC2rwnhYX3otZito5vg1Pk",
            authDomain: "chickenmeasurer-37304.firebaseapp.com",
            projectId: "chickenmeasurer-37304",
            storageBucket: "chickenmeasurer-37304.firebasestorage.app",
            messagingSenderId: "871581751225",
            appId: "1:871581751225:web:bec4978ba235c1c4418868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Kiosk look: hybrid view allows seeing terrain maps/roads cleanly
        const mapOptions = {
            center: { lat: 47.0379, lng: -122.9007 },
            zoom: 10,
            mapTypeId: google.maps.MapTypeId.HYBRID, 
            disableDefaultUI: true, // Removes all buttons/clutter for clean display look
            styles: [
                { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] } 
            ]
        };

        const map = new google.maps.Map(document.getElementById("map"), mapOptions);

        let activePositions = [];
        let masterBounds = new google.maps.LatLngBounds();
        let currentPinIndex = 0;

        async function loadDisplayData() {
            try {
                const querySnapshot = await getDocs(collection(db, "submissions"));
                const turfPoints = []; 

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    if (data.location && data.location.lat && data.location.lon) {
                        const lat = parseFloat(data.location.lat);
                        const lng = parseFloat(data.location.lon);
                        const pos = { lat: lat, lng: lng };
                        
                        // Drop minimal styled pins for clean layout look
                        new google.maps.Marker({
                            position: pos,
                            map: map,
                            icon: {
                                path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                                scale: 5,
                                fillColor: "#b71c1c",
                                fillOpacity: 0.9,
                                strokeColor: "#ffffff",
                                strokeWeight: 2
                            }
                        });

                        activePositions.push(pos);
                        masterBounds.extend(pos);
                        turfPoints.push(turf.point([lng, lat]));
                    }
                });

                // Generate perimeter layout
                if (turfPoints.length >= 3) {
                    const featureCollection = turf.featureCollection(turfPoints);
                    const hull = turf.convex(featureCollection);

                    if (hull && hull.geometry && hull.geometry.coordinates) {
                        const pathCoords = hull.geometry.coordinates[0].map(coord => {
                            return { lat: coord[1], lng: coord[0] };
                        });

                        new google.maps.Polygon({
                            paths: pathCoords,
                            strokeColor: "#d39e3a",   
                            strokeOpacity: 0.8,
                            strokeWeight: 2,
                            fillColor: "#003399",     
                            fillOpacity: 0.08,
                            map: map
                        });
                    }
                }

                // Initialize the looping camera animation sequence
                if (activePositions.length > 0) {
                    map.fitBounds(masterBounds);
                    setTimeout(startAutopilotLoop, 6000); // Wait 6 seconds showing full grid, then roll
                }

            } catch (err) {
                console.error("Display data pipeline break:", err);
            }
        }

        // The Autopilot Sequence Handler
        function startAutopilotLoop() {
            if (activePositions.length === 0) return;

            // Target the next pin coordinate details
            const targetCoordinate = activePositions[currentPinIndex];

            // 1. Pan smoothly to the specific job site location
            map.panTo(targetCoordinate);

            // 2. Zoom closer after camera slide completes
            setTimeout(() => {
                map.setZoom(14); // Tight focus zoom showing roads/satellite assets
            }, 1200);

            // 3. Stay focused on the location, then pull back out
            setTimeout(() => {
                map.setZoom(10);
                map.panTo(masterBounds.getCenter()); // Return to center grid view
            }, 7000);

            // Increment loop pointer index
            currentPinIndex = (currentPinIndex + 1) % activePositions.length;

            // Schedule next tracking jump timeline framework sequence loop (runs every 15 seconds)
            setTimeout(startAutopilotLoop, 15000);
        }

        google.maps.event.addDomListener(window, "load", loadDisplayData);
    </script>
</body>
</html>
